name: CI

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate documentation structure
        run: |
          test -f README.md
          test -f docs/ARCHITECTURE.md
          test -f docs/diagrams/architecture.mmd
          test -f docs/diagrams/workflow.mmd
